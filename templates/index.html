<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexSync | Cloud Importer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accents-1: #111111;
            --accents-2: #333333;
            --accents-3: #444444;
            --border: #1f1f1f;
            --secondary: #a1a1a1;
            --glow: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            cursor: default;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Subtle grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(to right, #0a0a0a 1px, transparent 1px),
                linear-gradient(to bottom, #0a0a0a 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Nav */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3rem 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 4px;
        }

        .settings-btn {
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .settings-btn:hover {
            opacity: 1;
        }

        /* Hero */
        .hero {
            padding: 4rem 0 6rem;
            text-align: left;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            line-height: 1;
        }

        .hero p {
            color: var(--secondary);
            font-size: 1.25rem;
            max-width: 600px;
            line-height: 1.5;
        }

        /* Uploader Area */
        .view {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-zone {
            border: 1px solid var(--border);
            padding: 8rem 2rem;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            background: linear-gradient(180deg, #050505 0%, #000 100%);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: #444;
            background: #050505;
        }

        .upload-zone::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top center, var(--glow), transparent 70%);
            pointer-events: none;
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .upload-text {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--fg);
        }

        /* Result View */
        .result-view {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            background: #050505;
        }

        .result-image-container {
            width: 100%;
            margin-bottom: 2rem;
            border-radius: 8px;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-image {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        .url-box {
            display: flex;
            background: #000;
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 8px;
            align-items: center;
            margin-bottom: 1rem;
        }

        .url-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.875rem;
            outline: none;
            width: 100%;
        }

        /* Form Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.2s ease-out;
        }

        .setup-card {
            background: #050505;
            border: 1px solid var(--border);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .setup-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 1rem;
            color: #fff;
            font-family: inherit;
            outline: none;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #666;
        }

        /* Buttons */
        .btn-black {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            border-radius: 8px;
            font-size: 0.9375rem;
        }

        .btn-black:hover {
            opacity: 0.9;
        }

        .btn-copy {
            width: auto;
            padding: 0.6rem 1.2rem;
            font-size: 0.8125rem;
            margin-left: 0.5rem;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--secondary);
            margin-top: 1rem;
        }

        .btn-ghost:hover {
            border-color: #444;
            color: #fff;
        }

        /* Loading */
        .status-msg {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.75rem; }
            .upload-zone { padding: 6rem 1.5rem; }
            .setup-card { padding: 2rem; }
            .url-box { flex-direction: column; padding: 0.75rem; }
            .btn-copy { width: 100%; margin: 0.5rem 0 0; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div id="overlay" class="overlay" style="display: none;">
        <div class="setup-card">
            <h2>Initialize ApexSync</h2>
            <form id="setup-form">
                <div class="input-group">
                    <label>Cloud Name</label>
                    <input type="text" id="cloud_name" placeholder="cloudinary_name" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label>API Key</label>
                    <input type="text" id="api_key" placeholder="api_key" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label>API Secret</label>
                    <input type="password" id="api_secret" placeholder="api_secret" autocomplete="off" required>
                </div>
                <button type="submit" class="btn-black">Get Started</button>
            </form>
        </div>
    </div>

    <div class="container">
        <nav class="nav">
            <div class="logo">
                <div class="logo-icon"></div>
                ApexSync
            </div>
            <div class="settings-btn" id="open-settings">Settings</div>
        </nav>

        <header class="hero">
            <h1>Cloud Importer.</h1>
            <p>A minimalist tool to sync your visual assets to the cloud. Fast, secure, and purely monochrome.</p>
        </header>

        <div id="view-upload" class="view active">
            <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">↑</div>
                <div class="upload-text">Select a file to upload</div>
                <div class="status-msg" id="status"></div>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>

        <div id="view-result" class="view">
            <div class="result-view">
                <div class="result-image-container">
                    <img id="result-img" class="result-image" src="" alt="Result">
                </div>
                <div class="url-box">
                    <input type="text" id="result-url" readonly>
                    <button id="copy-btn" class="btn-black btn-copy">Copy Link</button>
                </div>
                <button id="upload-another" class="btn-black btn-ghost">Upload Another</button>
            </div>
        </div>
    </div>

    <script>
        const elements = {
            overlay: document.getElementById('overlay'),
            setupForm: document.getElementById('setup-form'),
            openSettings: document.getElementById('open-settings'),
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            viewUpload: document.getElementById('view-upload'),
            viewResult: document.getElementById('view-result'),
            resultImg: document.getElementById('result-img'),
            resultUrl: document.getElementById('result-url'),
            copyBtn: document.getElementById('copy-btn'),
            uploadAnother: document.getElementById('upload-another'),
            status: document.getElementById('status'),
            cloudName: document.getElementById('cloud_name'),
            apiKey: document.getElementById('api_key'),
            apiSecret: document.getElementById('api_secret')
        };

        let config = JSON.parse(localStorage.getItem('apexsync_config'));

        function init() {
            if (!config) {
                elements.overlay.style.display = 'flex';
            } else {
                elements.overlay.style.display = 'none';
            }
        }

        elements.setupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            config = {
                cloudName: elements.cloudName.value.trim(),
                apiKey: elements.apiKey.value.trim(),
                apiSecret: elements.apiSecret.value.trim()
            };
            localStorage.setItem('apexsync_config', JSON.stringify(config));
            elements.overlay.style.display = 'none';
        });

        elements.openSettings.addEventListener('click', () => {
            if (config) {
                elements.cloudName.value = config.cloudName;
                elements.apiKey.value = config.apiKey;
                elements.apiSecret.value = config.apiSecret;
            }
            elements.overlay.style.display = 'flex';
        });

        elements.dropZone.addEventListener('click', () => elements.fileInput.click());
        
        elements.fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleUpload(e.target.files[0]);
        });

        elements.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.dropZone.style.borderColor = "#666";
        });

        elements.dropZone.addEventListener('dragleave', () => {
            elements.dropZone.style.borderColor = "var(--border)";
        });

        elements.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.dropZone.style.borderColor = "var(--border)";
            if (e.dataTransfer.files[0]) handleUpload(e.dataTransfer.files[0]);
        });

        async function handleUpload(file) {
            if (!config) {
                elements.overlay.style.display = 'flex';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('cloud_name', config.cloudName);
            formData.append('api_key', config.apiKey);
            formData.append('api_secret', config.apiSecret);

            elements.status.innerHTML = '<div class="spinner"></div><span>Uploading to Cloudinary</span>';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok && data.secure_url) {
                    elements.resultImg.src = data.secure_url;
                    elements.resultUrl.value = data.secure_url;
                    elements.viewUpload.classList.remove('active');
                    elements.viewResult.classList.add('active');
                    elements.status.textContent = '';
                } else {
                    throw new Error(data.error || 'The upload failed.');
                }
            } catch (err) {
                elements.status.textContent = 'Error: ' + err.message;
            }
        }

        elements.copyBtn.addEventListener('click', () => {
            elements.resultUrl.select();
            navigator.clipboard.writeText(elements.resultUrl.value);
            
            const originalText = elements.copyBtn.textContent;
            elements.copyBtn.textContent = 'Copied Link';
            setTimeout(() => elements.copyBtn.textContent = originalText, 2000);
        });

        elements.uploadAnother.addEventListener('click', () => {
            elements.fileInput.value = '';
            elements.viewResult.classList.remove('active');
            elements.viewUpload.classList.add('active');
        });

        init();
    </script>
</body>
</html>
